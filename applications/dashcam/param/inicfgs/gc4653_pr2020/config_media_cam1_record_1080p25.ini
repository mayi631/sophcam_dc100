[common]
media_mode = "record_1080p25"

; vb pool config
[vb_config]
vbpool_cnt = 3

[vbpool0]
enable          = 1
frame_width     = 320
frame_height    = 180
frame_fmt       = 19 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 3

[vbpool1]
enable          = 1
frame_width     = 640
frame_height    = 360
frame_fmt       = 19 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 3

[vbpool2]
enable          = 1
frame_width     = 1920
frame_height    = 1080
frame_fmt       = 22 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 4

; sensor
[sensor_config1]
enable  = 1
id      = 1
wdrmode = 0 ;0:linear, 3:wdr 2to1
sensortype = 0X18013240 ;PIXELPLUS_PR2020_2M_25FPS_8BIT 402731584
i2cid   = 4
i2caddr = 92 ;
hwsync  = 0
mclk_en = 1
cam_clk_id = 1; 0:clk0, 1:clk1
rst_gpio_inx = 2; 0: group A, 1: group B ...
rst_gpio_pin = 0; 0: PIN 0, 1: PIN 1, 2: PIN 2....
rst_gpio_pol = 0; 1: OF_GPIO_ACTIVE_LOW, 2: OF_GPIO_SINGLE_ENDED, 4: OF_GPIO_OPEN_DRAIN
                ; 8: OF_GPIO_TRANSITORY, 16: OF_GPIO_PULL_UP, 32: OF_GPIO_PULL_DOWN
mipidev = 1
laneid0 = -1
laneid1 = -1
laneid2 = -1
laneid3 = -1
laneid4 = -1
swap0   = 0
swap1   = 0
swap2   = 0
swap3   = 0
swap4   = 0
apipe0            = 1
apipe1            = -1

; vcap
[vcap_config1]
enable  = 1
id      = 1
width   = 1920
height  = 1080
fmt     = 22 ; //12 yuv422 //13 yuv420 //19 nv21 //18 nv12
cpress  = 1 ;NONE : 0 TILE : 1,LINE:2, FRAME:3
mirror  = 0
filp    = 0
fps     = 25
scene_mode  = 1 ; 0 VI_ISP_YUV_SCENE_BYPASS
                ; 1 VI_ISP_YUV_SCENE_ONLINE
                ; 2 VI_ISP_YUV_SCENE_ISP


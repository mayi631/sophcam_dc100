; venc
[venc_config]
chn_num = 2

[venc_chn0]
enable      = 1
id          = 6
bind_vproc_id       = 1
bind_vproc_chn_id   = 0
width       = 640
height      = 480
codec       = 2 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 13; //12 yuv422 //13 yuv420;
single_EsBuf= 1
jpeg_quality= 80
bufSize     = 4194304


[venc_chn1]
enable      = 1
id          = 7
bind_vproc_id       = 1
bind_vproc_chn_id   = 2
width       = 320
height      = 180
codec       = 2 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 13; //12 yuv422 //13 yuv420;
single_EsBuf= 1
jpeg_quality= 80
bufSize     = 65536

; osd config
[osd_config]
osd_cnt     = 1
osdc_enable = 0

[osd_content0]
type        = 0 ;//0 - time 1 - customeer string 2 - bmp
color       = 65535 ;//argb1555 0xffff
time_fmt    = 0 ;//yyyy-mm-dd
width       = 24
height      = 30
bg_color    = 32767 ; argb1555 0x7fff
display_num = 1

[osd_content0.osd_display0]
enable      = 1
rgn_type    = 1;// 0:RGN_CMPR_RECT ; 1:RGN_CMPR_BIT_MAP;2:RGN_CMPR_LINE
bind_mode   = 0 ;//0 - vproc mode 1 - disp mode
mod_hdl     = 1 ;//vproc id
chn_hdl     = 0 ;//vproc chnid
coordinate  = 0 ;//0 - RATIO_COOR  1 - ABS_COOR
start_x     = 1
start_y     = 95
batch       = 1 ;//0 camid = 0, 1 camid = 1
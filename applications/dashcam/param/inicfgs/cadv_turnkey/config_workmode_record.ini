[common]
work_mode = "record"
cam_num = 2

[vi_vpss_mode0]
pipe_mode       = 0 ;0: vi offline vpss offline, 1: vi offline vpss online
vi_vpss_pipe    = 0 ;0: vi pipe 0, 1: vi pipe 1

[vi_vpss_mode1]
pipe_mode       = 0 ;0: vi offline vpss offline, 1: vi offline vpss online
vi_vpss_pipe    = 1 ;0: vi pipe 0, 1: vi pipe 1

[vpss_mode]
mode            = 1 ;0: single mode, 1: dual mode

[vpss_mode.dev0]
input           = 0 ;0: input mem, 1: input isp

[vpss_mode.dev1]
input           = 0 ;0: input mem, 1: input isp

[config0]
cam_id = 0
media_mode = "record_1440p25"

[config1]
cam_id = 1
media_mode = "record_1080p25"


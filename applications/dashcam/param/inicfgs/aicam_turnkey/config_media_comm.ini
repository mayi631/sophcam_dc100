[work_mode]
poweron_mode = "photo"

; vo config
[vo_config]
vo_cnt  = 1

[vo0]
width   = 640
height  = 480
fps     = -1
rotate  = 0  ; 0:0 1:90 2:180 3:270
frame_fmt  = 18 ; 12: yuv422  13: yuv420 19:NV21
enIntfSync = 21; see VO_INTF_SYNC_E, 21:VO_OUTPUT_640x480_60

; window config
[window_config]
window_cnt  = 1

[window0]
enable      = 1
used_crop   = 1
small_win_enable    = 0
bind_vproc_id       = 1
bind_vproc_chn_id   = 0
x           = 0
y           = 0
width       = 640
height      = 480
s_x         = 0
s_y         = 0
s_width     = 640
s_height    = 480
onestep     = 20
ystep       = 0
mirror      = 0
filp        = 0

; Ai config
[ai]
sample_rate = 16000
channel     = 2
num_per_frm = 640
audio_channel = 1
isVquOn = 0
volume = 48 ;mars3: 0~48

; Aenc config
[aenc]
format      = 3 ; 0: aac, 3: disable
sample_rate = 16000
num_per_frm = 1024
channel     = 2

; Ao config
[ao]
PowerPinId = 354 ;HAL_GPIOE_02
sample_rate = 16000
channel     = 2
num_per_frm = 80
audio_channel = 1
volume = 32

; Speech config
[speech]
enable      = 1
sample_rate = 16000
bitWidth    = 1 ;; 0: AUDIO_BIT_WIDTH_8; 1: AUDIO_BIT_WIDTH_16; 2: AUDIO_BIT_WIDTH_24; 3: AUDIO_BIT_WIDTH_32
model_path  = "/mnt/data/bin/sound_cardv_sr16k_v5_cv181x.cvimodel"

; record
[record_config]
rec_cnt = 1

[record0]
enable          = 1
sub_video_en = 1
bind_venc_id    = 0
audio_status    = 1
file_type       = 1 ;// 0:MP4, 1:MOV, 2:TS, 3:ES, 4:NONE
split_time      = 60000 ; msec
pre_time        = 0 ; sec
post_time       = 10 ; sec
timelapse_recorder_fps  = 25
timelapse_recorder_gop  = 0
memory_buffer_sec = 0
pre_alloc_unit  = 20 ;//pre allocate unit  MB
short_file_ms = 500
devmodel = "sophgo"
focus_pos = 300 ;focus
focus_pos_lock = 0 ;0: can change focus_pos; 1: can't

[record0_sub]
sub_bind_venc_id    = 1

; rtsp config
[rtsp_config]
rtsp_cnt    = 1
port=554
timeout=120

[rtsp0]
enable      = 0
bind_venc_id= 1
max_conn = 2
name = "cvi_cam_0";if use cgi, the name should be liveRTSP/av0

; PIV config
[piv_config]
piv_cnt     = 0

[piv0]
bind_venc_id    = 0

[piv1]
bind_venc_id    = 6

; thm config
[thm_config]
thm_cnt     = 1

[thm0]
bind_venc_id    = 2

; sub pic config
[sub_pic_config]
sub_pic_cnt = 1

[sub_pic0]
bind_venc_id    = 1

[photo_config]
photo_cnt     = 1
vprocdev_id   = 1

[photo0]
enable      = 1
bind_venc_id = 0
bind_vcap_id = 0
; raw6(dmcp) when [vcap_config0].cpress = 1; raw12 when [vcap_config0].cpress = 0
enable_dump_raw = 0;0: disable, 1: enable

[motionDet_config]
md_cnt = 2
motionSensitivity = 50

[md0]
enable = 0
bind_vproc_id = 0
bind_vproc_chn_id = 4
[md1]
enable = 0
bind_vproc_id = 1
bind_vproc_chn_id = 4

[adas_config]
adas_cnt = 0
model_fps = 12.5
model_vb_width = 640
model_vb_heigt = 384
car_model_path  = "/mnt/data/bin/vehicle_det.cvimodel"
lane_model_path  = "/mnt/data/bin/lane_det.cvimodel"

[adas0]
enable = 0
bind_vproc_id = 0
bind_vproc_chn_id = 2

[qrcode_config]
qrcode_cnt = 0

[qrcode0]
enable = 0
bind_vproc_id = 0
bind_vproc_chn_id = 5

[facep_config]
facep_cnt = 1

[facep0]
fd_enable        = 0
fattr_enable     = 0
in_vpss_grp         = 1
in_vpss_chn         = 0
in_width        = 640
in_height       = 480
model_width      = 768
model_height     = 432
model_fd_thres     = 0.7
model_fd_path    = "/mnt/data/bin/model/scrfd_det_face_432_768_INT8_mars3.bmodel"
model_fattr_path = "/mnt/data/bin/model/cls_attribute_gender_age_glass_emotion_tiny_112_112_INT8_cv184x.bmodel"
osd_id = 1

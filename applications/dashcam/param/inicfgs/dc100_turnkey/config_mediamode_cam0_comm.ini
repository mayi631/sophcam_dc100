[camera]
enable          = 1 ; 0:disable,  1:enable
osdshow         = 0 ; 0:disable,  1:enable
cam_id          = 0
cur_mode        = "photo_2160p"

[mediamode]
; 须与 config_access_entry.ini 中 media_cam0_* 模块数量一致（不含 mediamode_cam0_comm）
; 当前 8 路 photo + 6 路 record = 14；count 过小会导致靠后的规格（如 record_1080p_new）无法被 PARAM_GetMediaMode 匹配
count           = 14
